<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DescuentoBot — Carrefour</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pill-active  { background-color: #4f46e5; color: #fff; }
    .pill-inactive { background-color: #1f2937; color: #9ca3af; }
    .pill-inactive:hover { background-color: #374151; color: #e5e7eb; }
    .card-enter { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Modal */
    #modal-overlay {
      transition: opacity 0.15s ease;
    }
    #modal-overlay.hidden { display: none; }
    #modal-box {
      animation: modalIn 0.18s ease-out;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-5">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-black tracking-tight">🛒 DescuentoBot</h1>
        <p class="text-gray-400 text-sm mt-0.5">Descuentos bancarios en Carrefour Argentina</p>
      </div>
      <button onclick="recargar()"
        class="text-xs text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 px-3 py-1.5 rounded-lg transition-colors">
        ↺ Actualizar
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-5">

    <!-- Filtros -->
    <section class="space-y-3">
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs text-gray-500 uppercase tracking-widest mr-1">Día</span>
        <div id="filtros-dia" class="flex flex-wrap gap-1.5"></div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs text-gray-500 uppercase tracking-widest mr-1">Formato</span>
        <div id="filtros-formato" class="flex flex-wrap gap-1.5"></div>
      </div>
    </section>

    <p id="contador" class="text-sm text-gray-400"></p>
    <div id="error" class="hidden bg-red-950 border border-red-800 text-red-300 rounded-xl px-4 py-3 text-sm"></div>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    <div id="loading" class="flex justify-center py-16">
      <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

  </main>

  <!-- Modal -->
  <div id="modal-overlay"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    onclick="cerrarModal(event)">
    <div id="modal-box"
      class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl"
      onclick="event.stopPropagation()">

      <!-- Modal header -->
      <div id="modal-header" class="flex items-start justify-between p-6 border-b border-gray-800">
        <div class="flex items-center gap-4">
          <span id="modal-descuento" class="text-6xl font-black leading-none"></span>
          <div>
            <p id="modal-banco" class="text-xl font-bold text-white"></p>
            <p id="modal-metodo" class="text-gray-400 text-sm mt-0.5"></p>
          </div>
        </div>
        <button onclick="cerrarModal()" class="text-gray-500 hover:text-white text-xl leading-none ml-4 mt-1">✕</button>
      </div>

      <!-- Modal body -->
      <div class="p-6 space-y-5">

        <!-- Descripción completa -->
        <div id="modal-promocion-wrap" class="hidden">
          <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">Descripción</p>
          <p id="modal-promocion" class="text-gray-200 leading-relaxed"></p>
        </div>

        <!-- Datos clave en grilla -->
        <div class="grid grid-cols-2 gap-3">
          <div id="modal-dia-wrap" class="hidden bg-gray-800 rounded-xl p-3">
            <p class="text-xs text-gray-500 mb-1">Día</p>
            <p id="modal-dia" class="text-white font-semibold text-sm"></p>
          </div>
          <div id="modal-formato-wrap" class="hidden bg-gray-800 rounded-xl p-3">
            <p class="text-xs text-gray-500 mb-1">Dónde</p>
            <p id="modal-formato" class="text-white font-semibold text-sm"></p>
          </div>
          <div id="modal-tope-wrap" class="hidden bg-gray-800 rounded-xl p-3">
            <p class="text-xs text-gray-500 mb-1">Tope</p>
            <p id="modal-tope" class="text-white font-semibold text-sm"></p>
          </div>
          <div id="modal-vigencia-wrap" class="hidden bg-gray-800 rounded-xl p-3">
            <p class="text-xs text-gray-500 mb-1">Vigencia</p>
            <p id="modal-vigencia" class="text-white font-semibold text-sm"></p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const DIAS_ORDEN = ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo'];

    let todos = [];
    let filtroDia = 'todos';
    let filtroFormato = 'todos';

    async function cargar() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      try {
        const res = await fetch('/api/descuentos');
        if (!res.ok) throw new Error(`Error ${res.status}`);
        todos = await res.json();
        renderFiltros();
        renderCards();
      } catch (e) {
        const el = document.getElementById('error');
        el.textContent = `No se pudieron cargar los datos: ${e.message}`;
        el.classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function recargar() {
      todos = [];
      filtroDia = 'todos';
      filtroFormato = 'todos';
      cargar();
    }

    function renderFiltros() {
      const diasSet = new Set();
      todos.forEach(d => {
        if (!d.dia || d.dia === 'Todos los dias' || d.dia === 'Sin datos') return;
        d.dia.split('/').forEach(s => diasSet.add(s.trim()));
      });
      const dias = ['todos', ...DIAS_ORDEN.filter(d => diasSet.has(d))];

      const formatosSet = new Set();
      todos.forEach(d => {
        if (!d.tipo_mercado) return;
        d.tipo_mercado.split('/').forEach(s => formatosSet.add(s.trim()));
      });
      const formatos = ['todos', ...Array.from(formatosSet).sort()];

      renderPills('filtros-dia', dias, filtroDia,
        val => { filtroDia = val; renderFiltros(); renderCards(); },
        v => v === 'todos' ? 'Todos' : v);
      renderPills('filtros-formato', formatos, filtroFormato,
        val => { filtroFormato = val; renderFiltros(); renderCards(); },
        v => v === 'todos' ? 'Todos' : v.replace('Carrefour ', ''));
    }

    function renderPills(containerId, values, active, onClick, label) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      values.forEach(val => {
        const btn = document.createElement('button');
        btn.textContent = label(val);
        btn.className = `text-xs font-medium px-3 py-1.5 rounded-full transition-colors cursor-pointer ${val === active ? 'pill-active' : 'pill-inactive'}`;
        btn.addEventListener('click', () => onClick(val));
        container.appendChild(btn);
      });
    }

    function filtrar() {
      return todos.filter(d => {
        const dias = d.dia === 'Todos los dias'
          ? DIAS_ORDEN
          : (d.dia || '').split('/').map(s => s.trim());
        const matchDia = filtroDia === 'todos' || dias.includes(filtroDia);
        const formatos = (d.tipo_mercado || '').split('/').map(s => s.trim());
        const matchFormato = filtroFormato === 'todos' || formatos.includes(filtroFormato);
        return matchDia && matchFormato;
      });
    }

    function colorDescuento(descuento) {
      const n = parseInt(descuento);
      if (isNaN(n)) return 'text-gray-400';
      if (n >= 30) return 'text-green-400';
      if (n >= 20) return 'text-yellow-400';
      return 'text-blue-400';
    }

    function badgeDia(dia) {
      if (!dia || dia === 'Sin datos') return '';
      if (dia === 'Todos los dias')
        return `<span class="text-xs bg-purple-900 text-purple-300 px-2 py-0.5 rounded-full">Todos los días</span>`;
      return dia.split('/').map(d =>
        `<span class="text-xs bg-indigo-900 text-indigo-300 px-2 py-0.5 rounded-full">${d.trim()}</span>`
      ).join('');
    }

    const FORMAT_COLORS = {
      'Carrefour Maxi':    'bg-orange-900 text-orange-300',
      'Carrefour Market':  'bg-teal-900 text-teal-300',
      'Carrefour Express': 'bg-cyan-900 text-cyan-300',
      'Carrefour Online':  'bg-sky-900 text-sky-300',
      'Carrefour Bio':     'bg-lime-900 text-lime-300',
      'Carrefour':         'bg-red-900 text-red-300',
    };

    function badgeFormato(tipo) {
      if (!tipo || tipo === 'Sin datos') return '';
      return tipo.split('/').map(t => {
        const key = t.trim();
        const cls = FORMAT_COLORS[key] || 'bg-gray-700 text-gray-300';
        const label = key.replace('Carrefour ', '') || 'Carrefour';
        return `<span class="text-xs ${cls} px-2 py-0.5 rounded-full">${label === 'Carrefour' ? 'Hiper' : label}</span>`;
      }).join('');
    }

    // Guarda el objeto data en el card via índice para no serializar en HTML
    let cardData = [];

    function cardHTML(d, idx) {
      const color = colorDescuento(d.descuento);
      const tope = d.tope && d.tope !== 'Sin tope' ? d.tope : null;
      const vigencia = d.vigencia && d.vigencia !== 'Sin datos' ? d.vigencia : null;
      const promocion = d.promocion || '';

      return `
        <div class="card-enter bg-gray-900 rounded-2xl p-5 flex flex-col gap-3 border border-gray-800
                    hover:border-gray-600 hover:bg-gray-800 transition-all cursor-pointer"
             onclick="abrirModal(${idx})">

          <div class="flex flex-wrap gap-1.5">
            ${badgeDia(d.dia)}
            ${badgeFormato(d.tipo_mercado)}
          </div>

          <div class="flex items-center gap-4">
            <span class="text-5xl font-black leading-none ${color}">${d.descuento || '?'}</span>
            <div class="min-w-0">
              <p class="text-white font-bold text-lg leading-tight truncate">${d.banco || 'Sin datos'}</p>
              <p class="text-gray-400 text-sm">${d.metodo_pago || ''}</p>
            </div>
          </div>

          ${promocion ? `<p class="text-gray-300 text-sm line-clamp-2 leading-relaxed">${promocion}</p>` : ''}

          ${(tope || vigencia) ? `
          <div class="flex justify-between text-xs text-gray-500 mt-auto pt-3 border-t border-gray-800">
            <span>${tope ? `Tope: ${tope}` : ''}</span>
            <span class="text-right">${vigencia || ''}</span>
          </div>` : ''}

        </div>`;
    }

    function renderCards() {
      const filtrados = filtrar();
      document.getElementById('contador').textContent =
        `Mostrando ${filtrados.length} descuento${filtrados.length !== 1 ? 's' : ''}`;
      cardData = filtrados;
      document.getElementById('grid').innerHTML = filtrados.map((d, i) => cardHTML(d, i)).join('');
    }

    // ── Modal ──────────────────────────────────────────────────────────────

    function setText(id, val) {
      document.getElementById(id).textContent = val || '';
    }
    function showWrap(id, condition) {
      document.getElementById(id).classList.toggle('hidden', !condition);
    }

    function abrirModal(idx) {
      const d = cardData[idx];
      const color = colorDescuento(d.descuento);

      // Header
      const descEl = document.getElementById('modal-descuento');
      descEl.textContent = d.descuento || '?';
      descEl.className = `text-6xl font-black leading-none ${color}`;
      setText('modal-banco', d.banco || 'Sin datos');
      setText('modal-metodo', d.metodo_pago || '');

      // Descripción
      const promo = d.promocion || '';
      setText('modal-promocion', promo);
      showWrap('modal-promocion-wrap', !!promo);

      // Día
      const dia = d.dia && d.dia !== 'Sin datos' ? d.dia.replace(/\//g, ' / ') : '';
      setText('modal-dia', dia === 'Todos los dias' ? 'Todos los días' : dia);
      showWrap('modal-dia-wrap', !!dia);

      // Formato (dónde)
      const formato = d.tipo_mercado && d.tipo_mercado !== 'Sin datos'
        ? d.tipo_mercado.split('/').map(s => s.trim().replace('Carrefour ', '')).join(', ')
        : '';
      setText('modal-formato', formato || 'Carrefour');
      showWrap('modal-formato-wrap', true);

      // Tope
      const tope = d.tope && d.tope !== 'Sin tope' ? d.tope : '';
      setText('modal-tope', tope);
      showWrap('modal-tope-wrap', !!tope);

      // Vigencia
      const vig = d.vigencia && d.vigencia !== 'Sin datos' ? d.vigencia : '';
      setText('modal-vigencia', vig);
      showWrap('modal-vigencia-wrap', !!vig);

      document.getElementById('modal-overlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function cerrarModal(e) {
      if (e && e.target !== document.getElementById('modal-overlay')) return;
      document.getElementById('modal-overlay').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('modal-overlay').classList.add('hidden');
        document.body.style.overflow = '';
      }
    });

    document.addEventListener('DOMContentLoaded', cargar);
  </script>

</body>
</html>
